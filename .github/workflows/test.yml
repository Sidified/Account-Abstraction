name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      # Install Rust (required for zkSync forge)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Install Foundry (correct way)
      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH

      # Install zkSync Forge
      - name: Install zkSync Forge
        run: |
          cargo install --git https://github.com/matter-labs/foundry-zksync --locked forge

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build

      # Ethereum tests
      - name: Run Ethereum tests
        run: forge test --match-path test/ethereum -vvv

      # zkSync tests
      - name: Run zkSync tests
        run: forge test --match-path test/zksync --zksync --system-mode=true -vvv