name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      # Install Rust (needed for zkSync forge)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Install Foundry (binary install - stable)
      - name: Install Foundry
        run: |
          curl -L https://github.com/foundry-rs/foundry/releases/latest/download/foundry_nightly_linux_amd64.tar.gz -o foundry.tar.gz
          tar -xzf foundry.tar.gz
          sudo mv forge cast anvil chisel /usr/local/bin/

      # Install zkSync Forge (overrides forge binary)
      - name: Install zkSync Forge
        run: |
          cargo install --git https://github.com/matter-labs/foundry-zksync --locked forge

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build

      # Ethereum tests
      - name: Run Ethereum tests
        run: forge test --match-path test/ethereum -vvv

      # zkSync tests
      - name: Run zkSync tests
        run: forge test --match-path test/zksync --zksync --system-mode=true -vvv